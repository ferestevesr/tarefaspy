<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block titulo %}
        Homepage
        {% endblock %}
    </title>

    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #ff4f9a, #ff7eb3);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1{
    color: white;
    margin-bottom: 20px;
}

a{
    color: white;
    text-decoration: none;
    font-weight: bold;
    margin-bottom: 30px;
}

#loginForm{
    background: white;
    width: 350px;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#loginForm input{
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

#loginForm input:focus{
    outline: none;
    border-color: #ff4f9a;
}

#loginForm button{
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ff4f9a;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

#loginForm button:hover{
    background: #e63e85;
}
</style>
</head>
<body>


{% block body %}
    <h1>Home page</h1>
    <a href="{{url_for('perfil',usuario='Fernando')}}">Redirecionar</a>
{% endblock %}

<form id="loginForm">

    <input id = "email"
        type="email"
        placeholder="E-mail"
        required
    >

    <input id="senha"
        type="password"
        placeholder="Senha"
        required
    >

    <button type="submit">
        Entrar
    </button>

</form>


<script src="/projetoti102/sos.js"></script>
</body>
</html>
